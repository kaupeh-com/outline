name: Build and Deploy KauDocs

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kaupeh-com/kaudocs
  OPENBAO_ADDR: https://openbao.kaupeh.work
  OPENBAO_ROLE: kaudocs-deploy

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          TAG="staging-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to OpenBao via GitHub OIDC
        id: openbao
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://github.com/kaupeh-com" | jq -r '.value')

          BAO_RESPONSE=$(curl -sS --request POST \
            "${OPENBAO_ADDR}/v1/auth/jwt/login" \
            --data "{\"role\":\"${OPENBAO_ROLE}\",\"jwt\":\"${OIDC_TOKEN}\"}")

          BAO_TOKEN=$(echo "$BAO_RESPONSE" | jq -r '.auth.client_token')

          if [ "$BAO_TOKEN" = "null" ] || [ -z "$BAO_TOKEN" ]; then
            echo "::error::OpenBao authentication failed"
            echo "$BAO_RESPONSE" | jq -r '.errors[]' 2>/dev/null
            exit 1
          fi

          echo "::add-mask::${BAO_TOKEN}"
          echo "token=${BAO_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Fetch GHCR credentials from OpenBao
        id: ghcr-creds
        run: |
          GHCR_TOKEN=$(curl -sS -H "X-Vault-Token: ${{ steps.openbao.outputs.token }}" \
            "${OPENBAO_ADDR}/v1/secret/data/cluster/ghcr" | jq -r '.data.data.token')

          echo "::add-mask::${GHCR_TOKEN}"
          echo "token=${GHCR_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: kaupeh-com
          password: ${{ steps.ghcr-creds.outputs.token }}

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.base
          push: false
          load: true
          tags: kaudocs-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=kaudocs-base:latest
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
